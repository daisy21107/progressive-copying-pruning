seed: 42
device: auto
out_dir: runs/progressive

data:
  root: ./data
  batch_size: 128
  num_workers: 0
  label_rule: parity
  pairing: static
  data_seed: 12345

teacher_ckpt: runs/teacher/teacher.pt

teacher_model:
  width: 32
  hidden: 128
  shared_encoder: true

student_model:
  width: 32
  hidden: 128
  shared_encoder: true

lr: 0.001
epochs: 10
temperature: 2.0

progressive:
  prune_per_epoch: 0.05   # 5% per epoch
  target_sparsity: 0.90   # up to 90%
  rerandomize: false      # if true, rerandomize pruned weights
