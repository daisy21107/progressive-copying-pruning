seed: 42
device: auto
out_dir: runs/oneshot

data:
  root: ./data
  batch_size: 128
  num_workers: 0
  label_rule: parity
  pairing: static
  data_seed: 12345

# path to trained teacher checkpoint
teacher_ckpt: runs/teacher/teacher.pt

teacher_model:
  width: 32
  hidden: 128
  shared_encoder: true

student_model:
  width: 32
  hidden: 128
  shared_encoder: true

lr: 0.001
epochs: 5
temperature: 2.0

posthoc_prune:
  enabled: true
  target_sparsity: 0.90
  fixed_target_sparsity: true
  rerandomize: false
