seed: 42
device: auto
out_dir: runs/dense

data:
  task: cifar100_binary_pairs
  root: ./data
  batch_size: 128
  num_workers: 0
  label_rule: parity
  pairing: static
  data_seed: 12345
  noise_std: 0.0
  noise_mode: fixed
  noise_seed: 2026

teacher_ckpt: runs/teacher_cifar100/teacher.pt

teacher_model:
  in_channels: 3
  width: 32
  hidden: 128
  shared_encoder: true

student_model:
  in_channels: 3
  width: 32
  hidden: 128
  shared_encoder: true

lr: 0.001
epochs: 40
temperature: 2.0
compute_cka: true
