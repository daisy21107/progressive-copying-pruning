seed: 42
device: auto
out_dir: runs/progressive_90pct_rq1

data:
  task: cifar100_binary_pairs
  root: ./data
  batch_size: 128
  num_workers: 0
  label_rule: parity
  pairing: static
  data_seed: 12345
  noise_std: 0.0

teacher_ckpt: runs/cifar_teacher_final/teacher.pt

teacher_model:
  in_channels: 3
  width: 16
  hidden: 64
  shared_encoder: true

student_model:
  in_channels: 3
  width: 16
  hidden: 64
  shared_encoder: true

lr: 0.001
epochs: 40
temperature: 2.0
compute_cka: true

progressive:
  prune_per_epoch: 0.05
  target_sparsity: 0.9
  rerandomize: false
  fixed_target_sparsity: true
  prune_milestones:
    - epoch: 5
      target_sparsity: 0.129
    - epoch: 10
      target_sparsity: 0.257
    - epoch: 15
      target_sparsity: 0.386
    - epoch: 20
      target_sparsity: 0.514 
    - epoch: 25
      target_sparsity: 0.643
    - epoch: 30
      target_sparsity: 0.771
    - epoch: 35
      target_sparsity: 0.9
