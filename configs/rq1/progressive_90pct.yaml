seed: 42
device: auto
out_dir: runs/progressive_90pct

data:
  task: cifar100_binary_pairs
  root: ./data
  batch_size: 128
  num_workers: 0
  label_rule: parity
  pairing: static
  data_seed: 12345
  noise_std: 0.0
  noise_mode: fixed
  noise_seed: 2026

teacher_ckpt: runs/teacher_cifar100/teacher.pt

teacher_model:
  in_channels: 3
  width: 48
  hidden: 192
  shared_encoder: true

student_model:
  in_channels: 3
  width: 48
  hidden: 192
  shared_encoder: true

lr: 0.001
epochs: 40
temperature: 2.0
compute_cka: true

progressive:
  prune_per_epoch: 0.05
  target_sparsity: 0.9
  rerandomize: false
  fixed_target_sparsity: true
  prune_milestones:
    - epoch: 13
      target_sparsity: 0.3
    - epoch: 26
      target_sparsity: 0.6
    - epoch: 39
      target_sparsity: 0.95
