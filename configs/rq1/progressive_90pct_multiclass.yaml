seed: 42
device: auto
out_dir: runs/progressive_90pct_multiclass

data:
  task: cifar100_multiclass
  root: ./data
  batch_size: 128
  num_workers: 0
  selected_superclasses:
    - aquatic_mammals
    - fish
    - flowers
    - food_containers
    - fruit_and_vegetables
    - household_electrical
    - household_furniture
    - insects
    - large_carnivores
    - vehicles_1

teacher_ckpt: runs/teacher_cifar100_multiclass/teacher.pt

teacher_model:
  arch: resnet18_cifar
  in_channels: 3

student_model:
  arch: resnet18_cifar
  in_channels: 3

lr: 0.001
epochs: 40
temperature: 2.0
compute_cka: true

progressive:
  target_sparsity: 0.95
  fixed_target_sparsity: true
  rerandomize: false
  prune_milestones:
    - epoch: 8 
      target_sparsity: 0.45
    - epoch: 16 
      target_sparsity: 0.68
    - epoch: 24 
      target_sparsity: 0.82
    - epoch: 32 
      target_sparsity: 0.95
